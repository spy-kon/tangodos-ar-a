name: Manual Deploy to IONOS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to IONOS via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASS }}
          port: ${{ secrets.IONOS_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.IONOS_DIR }}
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/*.md
